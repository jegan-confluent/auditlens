# Classification Rules for Confluent Audit Log Intelligence System
#
# Criticality Levels:
# - CRITICAL: Immediate attention required (destructive operations, security breaches)
# - HIGH: Attention within hours (credential operations, permission changes)
# - MEDIUM: Daily review (configuration changes, resource modifications)
# - LOW: Archive/audit trail (read operations, routine activity)
#
# To add new methods, add them to the appropriate section below.
# Changes take effect on next forwarder restart.

critical_methods:
  # Kafka Cluster Operations
  - DeleteKafkaCluster
  - PauseKafkaCluster

  # Environment & Organization
  - DeleteEnvironment
  - DeleteOrganization
  - DeleteOrg

  # Kafka Topic Operations (destructive)
  - kafka.DeleteTopics
  - kafka.DeleteRecords

  # Connector Operations
  - DeleteConnector

  # ksqlDB Operations
  - DeleteKsqldbCluster

  # Flink Operations
  - DeleteFlinkCompute
  - DeleteFlinkStatement
  - DeleteStatement

  # Schema Registry (destructive)
  - DeleteSchema
  - DeleteSubject

  # Network Operations
  - DeletePrivateLinkAccess
  - DeleteNetworkLinkEndpoint
  - DeleteNetworkLinkService
  - DeletePeering
  - DeleteTransitGatewayAttachment
  - DeleteTransitGateway

  # Service Account Operations (security-critical)
  - DeleteServiceAccount

  # Identity Provider
  - DeleteIdentityProvider
  - DeleteIdentityPool

  # Audit Log Configuration (meta-security)
  - DeleteAuditLogConfig
  - UpdateAuditLogConfig

  # BYOK/Encryption
  - DeleteByokKey

  # TableFlow
  - DeleteTableflow

  # Pipeline Operations
  - DeletePipeline

  # Workspace Operations
  - DeleteWorkspace

  # Stream Processing / Exporter
  - DeleteExporter

  # Domain & Access Point
  - DeleteDomain
  - DeleteAccessPoint

  # RBAC — *ById is the variant Confluent emits.
  - DeleteRoleBindingById
  # Promoted from HIGH: revoking all role-resource bindings is irreversible.
  - RevokeRoleResourcesForPrincipal
  # Schema Registry cluster delete loses all subjects + schemas.
  - DeleteSchemaRegistryCluster
  # Promoted from MEDIUM: tearing down a network removes connectivity.
  - DeleteNetwork
  # KSQL cluster delete (capital-K naming variant).
  - DeleteKSQLCluster
  # SSO connection delete cuts off federation.
  - DeleteSSOConnection

high_methods:
