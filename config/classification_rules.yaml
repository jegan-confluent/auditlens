  - DeleteInvitation
  - CreateUser
  - DeleteUser
  - UpdateUser
  - InviteUser

  # Identity Provider Configuration
  - CreateIdentityProvider
  - UpdateIdentityProvider
  - CreateIdentityPool
  - UpdateIdentityPool

