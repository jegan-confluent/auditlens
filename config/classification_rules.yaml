  - UpdateServiceAccount

  # Role Binding Operations (RBAC)
  - CreateRoleBinding
  - DeleteRoleBinding
  - UpdateRoleBinding
  - UnbindAllRolesForPrincipal
  # Note: RevokeRoleResourcesForPrincipal was promoted to CRITICAL.
  - GrantRoleResourcesForPrincipal
  - BindRoleForPrincipal

  # User Management
