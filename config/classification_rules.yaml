# Pattern matching for method classification
patterns:
  deletion:
    - Delete
    - Remove
    - Purge
    - Drop
  creation:
    - Create
    - Add
    - New
    - Register
  modification:
    - Update
    - Alter
    - Modify
    - Change
    - Set
  read:
    - Get
    - List
    - Describe
    - Fetch
    - Read
    - Find
    - Show

# Sensitive keywords for method detection
sensitive_keywords:
  - apikey
  - api_key
  - serviceaccount
  - service_account
  - acl
  - rolebinding
  - role_binding
  - identity
  - credential
  - secret
  - password
  - token
  - permission
