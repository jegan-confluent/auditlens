  - DeleteDnsForwarder

  # Integrations
  - CreateIntegration
  - DeleteIntegration

  # Stream Processing / Exporter
  - CreateExporter

  # Alerting
  - CreateAlert

  # Domain & Access Point
  - CreateDomain
  - CreateAccessPoint

  # Caps-API spellings Confluent actually emits.
  - CreateAPIKey
  - DeleteAPIKey
  - UpdateAPIKey

  # SSO connection mutations.
  - CreateSSOConnection
  - UpdateSSOConnection

  # Promoted from MEDIUM.
  - kafka.AlterConfigs
  - kafka.IncrementalAlterConfigs
