services:
  audit-forwarder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: audit-forwarder:v3.0.0
    container_name: audit-forwarder
    restart: unless-stopped
    env_file:
      - .env
      - .secrets
    environment:
      # Only override defaults here, all other vars come from env_file
      - DEST_TOPIC=${DEST_TOPIC:-audit_events_flattened}
      - AUDIT_TOPIC=${AUDIT_TOPIC:-confluent-audit-log-events}
      - GROUP_ID=${GROUP_ID:-audit-fwd-v3-feb}
      # NOTE: Offsets are now managed by Kafka consumer groups (no OFFSET_FILE)
      - METRICS_PORT=8003
      - ENABLE_MULTI_TOPIC_ROUTING=${ENABLE_MULTI_TOPIC_ROUTING:-true}
      - DROP_LOW_EVENTS=${DROP_LOW_EVENTS:-true}
    volumes:
      # NOTE: ./data volume removed - forwarder is now stateless
      - ./audit_forwarder.py:/app/audit_forwarder.py:ro
      - ./src:/app/src:ro
    ports:
      - "8003:8003"
    # Use default Docker DNS instead of hardcoded Google DNS
    # dns:
    #   - 8.8.8.8
    #   - 8.8.4.4
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"
        compress: "true"
    networks:
      - kafka-network  # Kafka communication
      - monitoring  # Metrics collection
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 1G
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true  # Forwarder is now stateless (offsets in Kafka)
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: audit-dashboard:v11.0
    container_name: dashboard
    restart: unless-stopped
    env_file:
      - .env
      - .secrets
    environment:
      # Confluent Cloud API credentials for ACL & Identity lookups
      - CONFLUENT_CLOUD_API_KEY=${CONFLUENT_CLOUD_API_KEY:-}
      - CONFLUENT_CLOUD_API_SECRET=${CONFLUENT_CLOUD_API_SECRET:-}
    volumes:
      - ./dashboard:/app:rw
    ports:
      - "8503:8501"
    networks:
      - kafka-network  # Access to Kafka data
      - frontend-network  # User interface access
    depends_on:
      - audit-forwarder
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: audit-prometheus
    restart: unless-stopped
    user: "65534:65534"  # nobody user
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    ports:
      - "9090:9090"
    networks:
      - monitoring  # Monitoring infrastructure
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL

  grafana:
    image: grafana/grafana:11.3.1
    container_name: audit-grafana
    restart: unless-stopped
    user: "472:472"  # grafana user
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      # SECURITY: Password must be set via GF_ADMIN_PASSWORD environment variable
      # Add to .env or .secrets: GF_ADMIN_PASSWORD=your-secure-password
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:?GF_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "3000:3000"
    networks:
      - monitoring  # Access to Prometheus metrics
      - frontend-network  # User interface access
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false  # Grafana needs write access for plugins and DB
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
  loki:
    image: grafana/loki:3.2.1
    container_name: loki
    user: "10001:10001"  # loki user
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - monitoring  # Log aggregation infrastructure
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false  # Loki needs write access for data
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  promtail:
    image: grafana/promtail:3.2.1
    container_name: promtail
    # SECURITY: Using non-root user (10001) instead of root for file-based log collection
    # Create logs directory with appropriate permissions: mkdir -p ./logs && chmod 755 ./logs
    user: "10001:10001"
    volumes:
      # SECURITY: File-based logging instead of Docker socket (safer approach)
      # Services should write logs to ./logs directory which Promtail reads
      - ./logs:/var/log/audit:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring  # Push logs to Loki
    restart: unless-stopped
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=50M
    cap_drop:
      - ALL

networks:
  # Network segmentation for better security isolation
  kafka-network:
    driver: bridge
    internal: false  # Needs external access to Confluent Cloud
  monitoring:
    driver: bridge
    internal: true  # Internal monitoring infrastructure only
  frontend-network:
    driver: bridge
    internal: false  # User-facing services (dashboard, Grafana)

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
