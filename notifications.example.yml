# AuditLens Notification Configuration
# Copy from notifications.example.yml and fill in your webhook URLs.
# The actual notifications.yml is gitignored.
#
# Each destination is independent: separate filters, separate channel.
# enabled: false skips the destination entirely (no HTTP call).
#
# Filter precedence (all must match — AND logic):
#   - signal_type        REQUIRED, at least one value
#   - min_risk_level     informational < low < medium < high < critical
#   - action_category    if set, event action_category must be in list
#   - exclude_actions    never alert if event.action is in this list
#
# Risk-level ordering: informational=0, low=1, medium=2, high=3, critical=4
# min_risk_level: high  → only events with risk_level >= high pass.

destinations:
  - name: "security-alerts"          # human label for logs
    type: slack                      # slack | teams | webhook | pagerduty
    webhook_url: "https://hooks.slack.com/services/REPLACE_ME"
    enabled: true
    # Max deliveries per 60s window. Excess events are batched into one
    # "N events suppressed" summary notification. 0 = unlimited. Default: 10.
    rate_limit_per_minute: 10
    filters:
      signal_type:
        - action_required
      # Optional additional filters:
      # min_risk_level: high
      # action_category:
      #   - Delete
      #   - Security
      # exclude_actions:
      #   - mds.Authorize
      #   - GetStatement

  - name: "ops-channel"
    type: teams
    webhook_url: "https://company.webhook.office.com/REPLACE_ME"
    enabled: true
    rate_limit_per_minute: 10
    filters:
      signal_type:
        - action_required
        - attention
      min_risk_level: medium

  - name: "audit-webhook"
    type: webhook                    # generic HTTP POST
    webhook_url: "https://your-siem.company.com/ingest"
    enabled: false
    rate_limit_per_minute: 30        # SIEM ingest can usually take more
    filters:
      signal_type:
        - action_required

  - name: "pagerduty-prod"
    type: pagerduty                  # PagerDuty Events API v2
    integration_key: "REPLACE_WITH_PD_INTEGRATION_KEY"  # routing_key from a PD Events API v2 integration
    enabled: false
    rate_limit_per_minute: 5         # PD wants real incidents — keep low
    filters:
      signal_type:
        - action_required
      min_risk_level: high
    # PagerDuty severity is derived from signal_type + risk_level:
    #   action_required + risk_level=critical → critical
    #   action_required (other)                → error
    #   attention                              → warning
    #   informational                          → info
    # dedup_key = event_fingerprint, so PD suppresses duplicate pages within its own window.

  - name: "daily-digest-slack"
    type: slack
    webhook_url: "https://hooks.slack.com/services/REPLACE_DIGEST_CHANNEL"
    enabled: false
    mode: digest                     # realtime (default) | digest
    digest_schedule: "09:00"         # UTC HH:MM — one summary delivered after this time, once per day
    rate_limit_per_minute: 0         # digest is a single message per day; no rate cap needed
    filters:
      signal_type:
        - action_required
        - attention
    # Digest mode buffers matching events in memory (FIFO, bounded at 1000 per destination).
    # At digest_schedule UTC, posts one Slack Block Kit summary with:
    #   - action_required + attention counts
    #   - Top 3 actors (action_required)
    #   - Top 3 actions (attention)
    #   - Top resource by event count
    #   - Dashboard link (only when DASHBOARD_URL env var is set)
    # Buffer + last_sent state reset on forwarder restart.
