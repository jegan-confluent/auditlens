apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-forwarder
  namespace: audit-forwarder
  labels:
    app.kubernetes.io/name: audit-forwarder
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/component: forwarder
    app.kubernetes.io/part-of: audit-intelligence
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 3  # Match with Kafka partition count / 4
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1  # Allow one extra pod during updates
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-forwarder
  template:
    metadata:
      labels:
        app.kubernetes.io/name: audit-forwarder
        app.kubernetes.io/version: "2.1.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
        container.apparmor.security.beta.kubernetes.io/forwarder: runtime/default
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      serviceAccountName: audit-forwarder
      automountServiceAccountToken: false  # Don't mount unless needed
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: forwarder
          image: audit-forwarder:2.1.0
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          ports:
            - name: metrics
              containerPort: 8003
              protocol: TCP
            - name: health
              containerPort: 8003
              protocol: TCP

          envFrom:
            - configMapRef:
                name: audit-forwarder-config
            - secretRef:
                name: audit-forwarder-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "2Gi"
              cpu: "2000m"
              ephemeral-storage: "2Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30

          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            # Mount GCS credentials if using GCS
            # - name: gcs-credentials
            #   mountPath: /app/gcs-credentials.json
            #   subPath: credentials.json
            #   readOnly: true

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: audit-forwarder-data
        - name: tmp
          emptyDir: {}
        # Uncomment for GCS
        # - name: gcs-credentials
        #   secret:
        #     secretName: gcs-credentials

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: audit-forwarder
                topologyKey: kubernetes.io/hostname

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: audit-forwarder

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: audit-forwarder
  namespace: audit-forwarder
  labels:
    app.kubernetes.io/name: audit-forwarder

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: audit-forwarder-data
  namespace: audit-forwarder
  labels:
    app.kubernetes.io/name: audit-forwarder
    app.kubernetes.io/version: "2.1.0"
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi  # Increased from 1Gi for production use
  storageClassName: standard  # Adjust based on your cluster (gp3 for AWS, premium-rwo for GCP, managed-premium for Azure)
