apiVersion: apps/v1
kind: Deployment
metadata:
  name: auditlens
  namespace: auditlens
  labels:
    app.kubernetes.io/name: auditlens
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/component: forwarder
    app.kubernetes.io/part-of: auditlens
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1  # Allow one extra pod during updates
  selector:
    matchLabels:
      app.kubernetes.io/name: auditlens
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auditlens
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8003"
        prometheus.io/path: "/metrics"
        container.apparmor.security.beta.kubernetes.io/forwarder: runtime/default
        seccomp.security.alpha.kubernetes.io/pod: runtime/default
    spec:
      serviceAccountName: auditlens
      automountServiceAccountToken: false  # Don't mount unless needed
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: forwarder
          image: auditlens-forwarder:1.0.0
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          ports:
            - name: metrics
              containerPort: 8003
              protocol: TCP
            - name: health
              containerPort: 8003
              protocol: TCP

          envFrom:
            - configMapRef:
                name: auditlens-config
            - secretRef:
                name: auditlens-secrets

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "1Gi"
            limits:
              memory: "2Gi"
              cpu: "2000m"
              ephemeral-storage: "2Gi"

          livenessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: health
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 30

          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: auditlens-data
              mountPath: /var/lib/auditlens
            # Mount GCS credentials if using GCS
            # - name: gcs-credentials
            #   mountPath: /app/gcs-credentials.json
            #   subPath: credentials.json
            #   readOnly: true

      volumes:
        - name: tmp
          emptyDir: {}
        - name: auditlens-data
          persistentVolumeClaim:
            claimName: auditlens-data
        # Uncomment for GCS
        # - name: gcs-credentials
        #   secret:
        #     secretName: gcs-credentials

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: auditlens
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: auditlens

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auditlens
  namespace: auditlens
  labels:
    app.kubernetes.io/name: auditlens
