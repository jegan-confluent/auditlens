# Docker Compose for testing with Confluent Platform
# Usage: docker-compose -f docker-compose.yml -f docker-compose.test.yml up

version: '3.8'

services:
  # Zookeeper for Confluent Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Confluent Kafka Broker
  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Confluent Schema Registry
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.3
    container_name: schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/subjects"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Confluent Control Center (Optional - UI for monitoring)
  control-center:
    image: confluentinc/cp-enterprise-control-center:7.5.3
    container_name: control-center
    depends_on:
      kafka:
        condition: service_healthy
      schema-registry:
        condition: service_healthy
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: kafka:29092
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: http://schema-registry:8081
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
    profiles:
      - ui

  # Initialize Kafka topics
  kafka-init:
    image: confluentinc/cp-kafka:7.5.3
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic confluent-audit-log-events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit-logs-processed --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic audit-logs-dlq --partitions 1 --replication-factor 1
        echo "Topics created successfully:"
        kafka-topics --bootstrap-server kafka:29092 --list

  # MinIO for S3-compatible testing
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Initialize MinIO bucket
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set myminio http://minio:9000 minioadmin minioadmin
        mc mb myminio/audit-logs-test --ignore-existing
        mc anonymous set download myminio/audit-logs-test
        echo "MinIO bucket created"

  # Override audit-forwarder for testing
  audit-forwarder:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      schema-registry:
        condition: service_healthy
    environment:
      # Confluent Kafka (local)
      AUDIT_BOOTSTRAP: kafka:29092
      AUDIT_API_KEY: ""
      AUDIT_API_SECRET: ""
      AUDIT_SASL_ENABLED: "false"
      AUDIT_TOPICS: confluent-audit-log-events
      # Destination
      DEST_BOOTSTRAP: kafka:29092
      DEST_API_KEY: ""
      DEST_API_SECRET: ""
      DEST_SASL_ENABLED: "false"
      DEST_TOPIC: audit-logs-processed
      # Schema Registry
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SCHEMA_REGISTRY_KEY: ""
      SCHEMA_REGISTRY_SECRET: ""
      # S3 (MinIO)
      S3_ENABLED: "true"
      S3_BUCKET: audit-logs-test
      S3_REGION: us-east-1
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      # DLQ
      DLQ_ENABLED: "true"
      DLQ_TOPIC: audit-logs-dlq
      # Logging
      LOG_LEVEL: DEBUG

  # Test runner
  test-runner:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: test-runner
    command: pytest tests/ -v --tb=short
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    environment:
      TEST_KAFKA_BOOTSTRAP: kafka:29092
      TEST_KAFKA_TOPIC: test-audit-logs
      TEST_S3_BUCKET: audit-logs-test
      TEST_S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://minio:9000
    volumes:
      - ../../tests:/app/tests:ro
    profiles:
      - test

  # Load generator for testing
  load-generator:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: load-generator
    entrypoint: ["python", "/app/scripts/generate_load.py"]
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP: kafka:29092
      TOPIC: confluent-audit-log-events
      NUM_EVENTS: 1000
    volumes:
      - ../../scripts:/app/scripts:ro
    profiles:
      - load-test

volumes:
  minio-data:
