# AuditLens guided installation template
# Recommended usage:
#   cp install.template.yaml install.local.yaml
#   # edit install.local.yaml with real values
#   bash setup.sh --config-file install.local.yaml
#
# Security note:
# - install.local.yaml is sensitive once you replace placeholders with real credentials
# - keep real secrets only in install.local.yaml or generated local files
# - do not commit install.local.yaml

# Required. Choose docker for local first-time installation.
# Use kubernetes only if you already have kubectl access and image delivery handled.
deployment_mode: docker

source:
  # Optional display label used only in installer summaries.
  # This is not a Confluent technical ID and is safe to leave as-is.
  display_name: Confluent Cloud Audit Logs

  # Required. Bootstrap endpoint for the Confluent Cloud audit-log cluster.
  # Example: pkc-xxxxx.us-west-2.aws.confluent.cloud:9092
  # Get this from the Kafka cluster settings for the audit-log cluster.
  # It does NOT come from `confluent audit-log describe`.
  bootstrap: "pkc-xxxxx.us-west-2.aws.confluent.cloud:9092"

  # Required. Kafka API key for the audit-log cluster.
  # This must match the audit-log cluster, not the workload cluster.
  # CLI helpers:
  #   confluent audit-log describe
  #   confluent api-key list --resource <CLUSTER_ID>
  #   confluent api-key create --service-account <SERVICE_ACCOUNT_ID> --resource <CLUSTER_ID>
  api_key: ""

  # Required. Kafka API secret for the audit-log cluster.
  api_secret: ""

  # Required. Audit log topic name. The default is usually correct.
  # Get the actual topic name from `confluent audit-log describe`.
  audit_topic: "confluent-audit-log-events"

  # Required. Kafka consumer group used by AuditLens.
  group_id: "auditlens-forwarder-v1"

  # Required. Use earliest for a first install if you want retained history.
  # Use latest if you only want new events going forward.
  auto_offset_reset: "earliest"

destination:
  # Optional display label used only in installer summaries.
  display_name: AuditLens Destination Cluster

  # Required. Bootstrap endpoint for the destination/internal Kafka cluster.
  # Example: pkc-yyyyy.ap-south-1.aws.confluent.cloud:9092
  bootstrap: "pkc-yyyyy.ap-northeast-1.aws.confluent.cloud:9092"

  # Required. Kafka API key for the destination cluster.
  api_key: ""

  # Required. Kafka API secret for the destination cluster.
  api_secret: ""

  # Required. Set true if the canonical AuditLens topics already exist.
  # Set false if you want the installer to create them.
  topics_exist: false

schema_registry:
  # Optional. Set true only if your deployment uses Schema Registry.
  enabled: false

  # Required only when enabled is true.
  # Example: https://psrc-xxxxx.us-west-2.aws.confluent.cloud
  url: "https://psrc-xxxxx.ap-southeast-2.aws.confluent.cloud"

  # Required only when enabled is true.
  api_key: ""

  # Required only when enabled is true.
  api_secret: ""

product:
  # Recommended. Protect API endpoints with token auth.
  api_auth_enabled: true

  # "generate" creates a secure local bootstrap admin token.
  # "existing" means you already have a token JSON file.
  api_token_mode: "generate"

  # Required only when api_token_mode is "existing".
  # Example: secrets/auditlens-api-tokens.json
  api_token_file: ""

  # Optional. Local Streamlit dashboard port.
  dashboard_port: 8503

  # Optional. Local forwarder health / metrics / API port.
  metrics_port: 8003

  # Optional. Reserved local port for the future MCP profile.
  mcp_port: 8080

  # Optional. Local single-entry landing page port.
  landing_port: 8088

  # Optional Slack webhook.
  slack_webhook_url: ""

  # Optional generic alerting webhook.
  alert_webhook_url: ""

  # Optional Confluent Cloud API key for identity enrichment and dashboard lookups.
  confluent_cloud_api_key: ""

  # Optional Confluent Cloud API secret for identity enrichment and dashboard lookups.
  confluent_cloud_api_secret: ""

persistence:
  # Recommended. Enables SQLite-backed product persistence.
  enabled: true

  # Current supported backend is sqlite.
  backend: "sqlite"

  # Required when persistence is enabled.
  # This is the runtime container path, not a host path.
  # The installer validates Docker volume writeability before startup.
  db_path: "/var/lib/auditlens/auditlens.db"
