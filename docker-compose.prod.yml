services:
  auditlens-forwarder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: auditlens-forwarder:v1.0.0
    container_name: auditlens-forwarder
    restart: always
    env_file:
      - path: .env
        required: false
      - path: .secrets
        required: false
    environment:
      - AUDIT_TOPIC=${AUDIT_TOPIC:-confluent-audit-log-events}
      - GROUP_ID=${GROUP_ID:-auditlens-forwarder-v1}
      - AUTO_OFFSET_RESET=${AUTO_OFFSET_RESET:-latest}
      - METRICS_PORT=${METRICS_PORT:-8003}
      - AUDIT_RAW_TOPIC=${AUDIT_RAW_TOPIC:-audit.raw.v1}
      - AUDIT_NORMALIZED_TOPIC=${AUDIT_NORMALIZED_TOPIC:-audit.normalized.v1}
      - AUDIT_ENRICHED_TOPIC=${AUDIT_ENRICHED_TOPIC:-audit.enriched.v1}
      - AUDIT_SIGNALS_DENIALS_TOPIC=${AUDIT_SIGNALS_DENIALS_TOPIC:-audit.signals.denials.v1}
      - AUDIT_SIGNALS_HIGHRISK_TOPIC=${AUDIT_SIGNALS_HIGHRISK_TOPIC:-audit.signals.highrisk.v1}
      - AUDIT_ALERTS_TOPIC=${AUDIT_ALERTS_TOPIC:-audit.alerts.v1}
      - DLQ_TOPIC=${DLQ_TOPIC:-audit.dlq.v1}
      - ALERT_ON_HIGH_RISK=${ALERT_ON_HIGH_RISK:-true}
      - PERSISTENCE_ENABLED=${PERSISTENCE_ENABLED:-true}
      - PERSISTENCE_BACKEND=${PERSISTENCE_BACKEND:-sqlite}
      - PERSISTENCE_DB_PATH=${FORWARDER_PERSISTENCE_DB_PATH:-/app/data/auditlens.db}
      - PERSISTENCE_DB_MAX_BYTES=${PERSISTENCE_DB_MAX_BYTES:-1073741824}
      - PERSISTENCE_WAL_MAX_BYTES=${PERSISTENCE_WAL_MAX_BYTES:-134217728}
      - PERSISTENCE_ENRICHED_RETENTION_DAYS=${PERSISTENCE_ENRICHED_RETENTION_DAYS:-3}
      - PERSISTENCE_SIGNALS_RETENTION_DAYS=${PERSISTENCE_SIGNALS_RETENTION_DAYS:-7}
      - PERSISTENCE_ALERTS_RETENTION_DAYS=${PERSISTENCE_ALERTS_RETENTION_DAYS:-14}
      - PERSISTENCE_AUDIT_RETENTION_DAYS=${PERSISTENCE_AUDIT_RETENTION_DAYS:-14}
      - KAFKA_CONSUME_BATCH_SIZE=${KAFKA_CONSUME_BATCH_SIZE:-100}
      - CONSUMER_POLL_TIMEOUT_SECONDS=${CONSUMER_POLL_TIMEOUT_SECONDS:-2.0}
      - CONSUMER_EMPTY_POLL_SLEEP_SECONDS=${CONSUMER_EMPTY_POLL_SLEEP_SECONDS:-0.25}
      - CONSUMER_BATCH_SLEEP_SECONDS=${CONSUMER_BATCH_SLEEP_SECONDS:-0.25}
      - KAFKA_RETRY_INITIAL_BACKOFF_SECONDS=${KAFKA_RETRY_INITIAL_BACKOFF_SECONDS:-1.0}
      - KAFKA_RETRY_MAX_BACKOFF_SECONDS=${KAFKA_RETRY_MAX_BACKOFF_SECONDS:-60.0}
      - KAFKA_QUEUED_MAX_MESSAGES_KBYTES=${KAFKA_QUEUED_MAX_MESSAGES_KBYTES:-65536}
      - KAFKA_PRODUCER_QUEUE_MAX_KBYTES=${KAFKA_PRODUCER_QUEUE_MAX_KBYTES:-65536}
      - ENABLE_DB_WRITER=${ENABLE_DB_WRITER:-true}
      # Read DATABASE_URL straight from .env so the forwarder hits the same
      # store as the api container. The wizard writes both DATABASE_URL and
      # FORWARDER_DATABASE_URL (matched values when Postgres is selected);
      # FORWARDER_DATABASE_URL is kept as a secondary fallback for
      # operators who hand-edited the legacy variable.
      - DATABASE_URL=${DATABASE_URL:-${FORWARDER_DATABASE_URL:-sqlite:////app/data/auditlens.db}}
      - DB_WRITE_BATCH_SIZE=${DB_WRITE_BATCH_SIZE:-100}
      - DB_WRITE_FLUSH_INTERVAL_SECONDS=${DB_WRITE_FLUSH_INTERVAL_SECONDS:-2}
      - DB_WRITE_BACKOFF_MAX_SECONDS=${DB_WRITE_BACKOFF_MAX_SECONDS:-60}
      - EVENT_RETENTION_DAYS=${EVENT_RETENTION_DAYS:-7}
      - DB_RETENTION_CLEANUP_INTERVAL_SECONDS=${DB_RETENTION_CLEANUP_INTERVAL_SECONDS:-3600}
      # Fail-secure default: a missing .env should NOT silently open the
      # API to anonymous viewers. Set API_AUTH_ENABLED=false explicitly
      # in .env only for short-lived local-only test runs.
      - API_AUTH_ENABLED=${API_AUTH_ENABLED:-true}
      - API_AUTH_TOKEN_FILE=${API_AUTH_TOKEN_FILE:-/run/secrets/auditlens-api-tokens.json}
      - API_MAX_SEARCH_RESULTS=${API_MAX_SEARCH_RESULTS:-500}
      - API_EXPORT_MAX_ROWS=${API_EXPORT_MAX_ROWS:-5000}
      - API_EXPORT_MAX_HOURS=${API_EXPORT_MAX_HOURS:-168}
      - MEMORY_LIMIT_MB=512
      # Schema Registry — optional Avro serialization
      - SCHEMA_REGISTRY_URL=${SCHEMA_REGISTRY_URL:-}
      - SCHEMA_REGISTRY_API_KEY=${SCHEMA_REGISTRY_API_KEY:-}
      - SCHEMA_REGISTRY_API_SECRET=${SCHEMA_REGISTRY_API_SECRET:-}
    volumes:
      - ./audit_forwarder.py:/app/audit_forwarder.py:ro
      - ./src:/app/src:ro
      - ./data/forwarder:/app/data
      - ./secrets:/run/secrets:ro
      - ./actor_mappings.yml:/app/actor_mappings.yml:ro
      - ./notifications.yml:/app/notifications.yml:ro
    ports:
      - "127.0.0.1:${METRICS_PORT:-8003}:${METRICS_PORT:-8003}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        compress: "true"
    networks:
      - kafka-network
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${METRICS_PORT:-8003}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M
    cpus: "0.25"
    mem_limit: 512m
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: auditlens-api:v0.1.0
    container_name: auditlens-api
    restart: always
    env_file:
      - path: .env
        required: false
      - path: .secrets
        required: false
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////var/lib/auditlens/auditlens_api.db}
      - AUDITLENS_RUNTIME_DIR=/var/lib/auditlens
      - FORWARDER_HEALTH_URL=${FORWARDER_HEALTH_URL:-http://auditlens-forwarder:${METRICS_PORT:-8003}/health}
      - EVENT_RETENTION_DAYS=${EVENT_RETENTION_DAYS:-7}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      - IAM_ENRICHMENT_ENABLED=${IAM_ENRICHMENT_ENABLED:-false}
      - CONFLUENT_CLOUD_API_KEY=${CONFLUENT_CLOUD_API_KEY:-}
      - CONFLUENT_CLOUD_API_SECRET=${CONFLUENT_CLOUD_API_SECRET:-}
    volumes:
      - auditlens_data:/var/lib/auditlens
      # Read-only: notifications.yml is operator-edited on the host and
      # hot-reloaded by the api process; the api never writes back to it.
      # `grep -r notifications.yml backend/app/` confirms no write paths.
      - ./notifications.yml:/app/notifications.yml:ro
    ports:
      # Host-bound so the install wizard can poll /health directly. Caddy
      # at :80 still reverse-proxies /api/* and /health for normal traffic.
      - "127.0.0.1:8080:8080"
    networks:
      - kafka-network
      - frontend-network
    # NO `user:` directive on purpose. The api image ships with
    # backend/docker_entrypoint.py which is DESIGNED to start as root,
    # chown the named-volume mount point at /var/lib/auditlens to
    # uid 1000 (so the api process can write), run alembic migrations
    # while still root (avoids permission issues on the SQLite hot
    # cache), then setuid/setgid to 1000:1000 before exec'ing uvicorn.
    # Forcing `user: 1000:1000` at the compose level defeats that
    # entrypoint (it silent-no-ops the chown branch on `if os.geteuid()
    # != 0:`) and breaks fresh installs on Mac Docker Desktop where the
    # named volume can come up with the wrong owner. Security posture
    # is preserved because the entrypoint drops privileges before any
    # request-handling code runs (see _drop_privileges in
    # backend/docker_entrypoint.py).
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=2).read()\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 384M
        reservations:
          cpus: '0.10'
          memory: 128M
    cpus: "0.50"
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api}
    image: auditlens-frontend:v0.1.0
    container_name: auditlens-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-/api}
    ports:
      # Host-bound so the install wizard can probe the Next.js server
      # directly. Caddy at :80 still serves end users via reverse proxy.
      - "127.0.0.1:3000:3000"
    networks:
      - frontend-network
    depends_on:
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/dashboard').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 384M
        reservations:
          cpus: '0.10'
          memory: 128M
    cpus: "0.50"
    mem_limit: 384m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  caddy:
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    container_name: auditlens-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      # macOS / dev fallback. :80 sometimes collides on macOS (local
      # Apache, AirPlay receiver before Sonoma, etc.); the Caddyfile
      # binds :8088 to the same routes so the operator can hit the UI
      # on http://localhost:8088 without touching the privileged port.
      - "${CADDY_FALLBACK_PORT:-8088}:8088"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - frontend-network
    depends_on:
      - frontend
      - api
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      # Caddyfile proxies /health to the api container — exercising the
      # whole request path catches both a stuck caddy AND a broken
      # upstream wiring. caddy:2-alpine doesn't ship curl, but wget is
      # available via busybox.
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    # Pin the platform so Apple Silicon stops warning ("the requested
    # image's platform (linux/amd64) does not match the detected host
    # platform (linux/arm64/v8)…"). Default is linux/amd64 because the
    # sha256 digest pinned above is for the amd64 manifest variant — any
    # other value causes `cannot overwrite digest` on pull and the
    # postgres + every downstream container fail to recreate. On Apple
    # Silicon, the wizard rewrites POSTGRES_PLATFORM=linux/arm64 in .env
    # (see render_env_file()) so Docker Desktop's qemu translation kicks
    # in cleanly and the warning disappears.
    platform: ${POSTGRES_PLATFORM:-linux/amd64}
    shm_size: '256mb'
    container_name: auditlens-postgres
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-auditlens}
      - POSTGRES_USER=${POSTGRES_USER:-auditlens}
      # Read the password from /run/secrets instead of an env var so it
      # is not visible to `docker inspect auditlens-postgres`. The wizard
      # writes the same value to .env so the api and postgres-exporter
      # (which still read DATABASE_URL / DATA_SOURCE_NAME from env) keep
      # working — that's the migration trade-off in this step. Note that
      # POSTGRES_PASSWORD_FILE only takes effect at initdb (i.e. fresh
      # data volume); on existing deploys the previously-baked password
      # is preserved by setup, which writes the existing value into the
      # secret file.
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    secrets:
      - postgres_password
    entrypoint: ["/bin/bash", "/usr/local/bin/tune.sh"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/tune.sh:/usr/local/bin/tune.sh:ro
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    networks:
      - kafka-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-auditlens} -d $${POSTGRES_DB:-auditlens}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
        reservations:
          cpus: '0.10'
          memory: 256M
    cpus: "0.75"
    mem_limit: 768m
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: audit-prometheus
    restart: always
    user: "65534:65534"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-7d}'
      - '--storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-1GB}'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - monitoring
      - frontend-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    cpus: "0.75"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL

  grafana:
    image: grafana/grafana:11.6.0@sha256:62d2b9d20a19714ebfe48d1bb405086081bc602aa053e28cf6d73c7537640dfb
    container_name: audit-grafana
    restart: always
    user: "472:472"
    env_file:
      - path: .secrets
        required: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      # Grafana supports the __FILE suffix for any env-var as a secret
      # indirection. The wizard writes the same value to .env so existing
      # deploys (where the volume already has an admin password baked in)
      # keep working through restarts — Grafana ignores _FILE on subsequent
      # boots once admin exists, but the secret file becomes the source of
      # truth for any future credential rotation.
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_admin_password
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_SECURITY_DISABLE_GRAVATAR=true
      - GF_SNAPSHOTS_EXTERNAL_ENABLED=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - monitoring
      - frontend-network
    depends_on:
      - prometheus
    secrets:
      - grafana_admin_password
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    cpus: "0.50"
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    container_name: audit-alertmanager
    restart: unless-stopped
    volumes:
      - ./prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"
    networks:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    mem_limit: 64m
    cpus: "0.1"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.3.2@sha256:8af2de1abbdd7aa92b27c9bcc96f0f4140c9096b507c77921ffddf1c6ad6c48f
    container_name: loki
    user: "10001:10001"
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - monitoring
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    cpus: "0.50"
    mem_limit: 512m
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp:mode=1777,size=100M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.3.2@sha256:cb4990801ec58975c5e231057c2bcf204c85fac428eec65ad66e0016c64b9608
    container_name: promtail
    user: "10001:10001"
    volumes:
      - ./logs:/var/log/audit:ro
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: always
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    cpus: "0.25"
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=50M
    cap_drop:
      - ALL

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0@sha256:31bdf410910646a05c7edde8d95ab771c9d78fbfbc26b50a52548707496c284d
    container_name: auditlens-postgres-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-auditlens}:${POSTGRES_PASSWORD:-changeme_set_in_env}@postgres:5432/${POSTGRES_DB:-auditlens}?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    mem_limit: 64m
    cpus: "0.1"
    read_only: true
    cap_drop:
      - ALL
    networks:
      - kafka-network
      - monitoring
    depends_on:
      - postgres
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true

  # Auto-update for any container whose image is NOT digest-pinned.
  # Most AuditLens services have @sha256 pins (caddy, grafana, loki,
  # promtail, alertmanager, postgres, postgres-exporter) so watchtower
  # will be a no-op for them. The forwarder/api/frontend images are
  # locally built from compose, also outside watchtower's reach. The
  # service is included so future un-pinned dependencies pick up
  # security patches without manual intervention.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: auditlens-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_POLL_INTERVAL:-300}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - WATCHTOWER_LABEL_ENABLE=false
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - frontend-network

  mcp-server:
    profiles:
      - future
    build:
      context: .
      dockerfile: src/mcp/Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: audit-mcp-server:v1.0.0
    container_name: audit-mcp-server
    restart: always
    env_file:
      - path: .env
        required: false
      - path: .secrets
        required: false
    environment:
      - MCP_PORT=${MCP_PORT:-8089}
      - MCP_HOST=0.0.0.0
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - AUDIT_ENRICHED_TOPIC=${AUDIT_ENRICHED_TOPIC:-audit.enriched.v1}
      - AUDIT_ALERTS_TOPIC=${AUDIT_ALERTS_TOPIC:-audit.alerts.v1}
      - DEST_BOOTSTRAP=${DEST_BOOTSTRAP:-}
      - DEST_API_KEY=${DEST_API_KEY:-}
      - DEST_API_SECRET=${DEST_API_SECRET:-}
      - SECURITY_PROTOCOL=${SECURITY_PROTOCOL:-SASL_SSL}
      - SASL_MECHANISM=${SASL_MECHANISM:-PLAIN}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - GCS_PROJECT_ID=${GCS_PROJECT_ID:-}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - CONFLUENT_CLOUD_API_KEY=${CONFLUENT_CLOUD_API_KEY:-}
      - CONFLUENT_CLOUD_API_SECRET=${CONFLUENT_CLOUD_API_SECRET:-}
    ports:
      - "127.0.0.1:${MCP_PORT:-8089}:${MCP_PORT:-8089}"
    networks:
      - kafka-network
      - frontend-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${MCP_PORT:-8089}/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 64M
    cpus: "0.50"
    mem_limit: 256m
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=100M
      - /app/cache:mode=0700,size=100M,uid=1001,gid=1001
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

networks:
  kafka-network:
    driver: bridge
    internal: false
  monitoring:
    driver: bridge
    internal: true
  frontend-network:
    driver: bridge
    internal: false

volumes:
  auditlens_data:
    name: auditlens_auditlens_data
  prometheus_data:
  grafana_data:
  loki_data:
  postgres_data:
  caddy_data:

# Docker secrets backing the postgres and grafana _FILE indirections.
# The wizard's _ensure_host_directories() preserves the existing
# POSTGRES_PASSWORD / GRAFANA_ADMIN_PASSWORD values (from .env) into
# these files, or generates fresh 32-char alphanumeric values on a clean
# install. Files are chmod 600 and host-gitignored.
secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt
