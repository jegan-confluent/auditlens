name: Security Scanning

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        scan-type: [image, filesystem, config]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.scan-type == 'image'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: matrix.scan-type == 'image'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: audit-forwarder:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Image)
        if: matrix.scan-type == 'image'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: audit-forwarder:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: false

      - name: Run Trivy vulnerability scanner (Filesystem)
        if: matrix.scan-type == 'filesystem'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-filesystem-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          ignore-unfixed: false

      - name: Run Trivy misconfiguration scanner (Config)
        if: matrix.scan-type == 'config'
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles(format('trivy-{0}-results.sarif', matrix.scan-type)) != ''
        with:
          sarif_file: 'trivy-${{ matrix.scan-type }}-results.sarif'
          category: trivy-${{ matrix.scan-type }}

      - name: Generate summary report
        if: always()
        run: |
          echo "## Trivy Security Scan Results (${{ matrix.scan-type }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "trivy-${{ matrix.scan-type }}-results.sarif" ]; then
            # Count vulnerabilities by severity
            CRITICAL=$(jq '[.runs[].results[] | select(.level=="error")] | length' trivy-${{ matrix.scan-type }}-results.sarif)
            HIGH=$(jq '[.runs[].results[] | select(.level=="warning")] | length' trivy-${{ matrix.scan-type }}-results.sarif)
            MEDIUM=$(jq '[.runs[].results[] | select(.level=="note")] | length' trivy-${{ matrix.scan-type }}-results.sarif)

            echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| 🔴 CRITICAL | $CRITICAL |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟠 HIGH | $HIGH |" >> $GITHUB_STEP_SUMMARY
            echo "| 🟡 MEDIUM | $MEDIUM |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$CRITICAL" -gt 0 ]; then
              echo "⚠️ **CRITICAL vulnerabilities found! Please fix before merging.**" >> $GITHUB_STEP_SUMMARY
            elif [ "$HIGH" -gt 0 ]; then
              echo "⚠️ **HIGH severity vulnerabilities found. Review recommended.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ **No critical or high severity vulnerabilities found.**" >> $GITHUB_STEP_SUMMARY
            fi
          fi

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0

  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Run Trivy secret scanner
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'secret'
          format: 'sarif'
          output: 'trivy-secret-results.sarif'

      - name: Upload secret scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-secret-results.sarif') != ''
        with:
          sarif_file: 'trivy-secret-results.sarif'
          category: trivy-secrets

  sbom-generation:
    name: Generate SBOM
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: audit-forwarder:${{ github.sha }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: audit-forwarder:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate SBOM with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: audit-forwarder:${{ github.sha }}
          format: 'cyclonedx'
          output: 'sbom.cyclonedx.json'

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 90

  compliance-check:
    name: Compliance Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Docker Bench Security
        run: |
          docker run --rm \
            --net host \
            --pid host \
            --userns host \
            --cap-add audit_control \
            -e DOCKER_CONTENT_TRUST=$DOCKER_CONTENT_TRUST \
            -v /etc:/etc:ro \
            -v /usr/bin/containerd:/usr/bin/containerd:ro \
            -v /usr/bin/runc:/usr/bin/runc:ro \
            -v /usr/lib/systemd:/usr/lib/systemd:ro \
            -v /var/lib:/var/lib:ro \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            --label docker_bench_security \
            docker/docker-bench-security || true

      - name: Check Kubernetes manifests with Datree
        run: |
          curl https://get.datree.io | /bin/bash
          datree test deploy/kubernetes/*.yaml --only-k8s-files || true

  final-status:
    name: Security Scan Status
    runs-on: ubuntu-latest
    needs: [trivy-scan, secret-scanning, sbom-generation]
    if: always()

    steps:
      - name: Check scan results
        run: |
          echo "All security scans completed"
          echo "Review results in the Security tab"

          if [ "${{ needs.trivy-scan.result }}" != "success" ]; then
            echo "❌ Trivy scan failed"
            exit 1
          fi

          if [ "${{ needs.secret-scanning.result }}" != "success" ]; then
            echo "❌ Secret scanning failed"
            exit 1
          fi

          echo "✅ All security scans passed"
